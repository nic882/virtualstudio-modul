<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nic's Kontakt</title>
    <link rel="stylesheet" href="CSS.css" />
  </head>
  <header>
    <div class="header-container">
      <div class="Header-titel">Kontakt</div>

      <nav>
        <ul>
          <li><a href="HTML.html">Home</a></li>
          <li><a href="Kontakt.html">Kontakt</a></li>
          <li><a href="Lebenslauf.html">Lebenslauf</a></li>
          <li><a href="Über_mich.html">Steckbrief</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <body>

    <main class="contact-container">
      <h1>Kontaktformular</h1>

      <form id="contact-form" class="contact-form" method="post" action="#">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Dein Name" />

        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" required placeholder="name@example.com" />

        <label for="subject">Betreff</label>
        <input type="text" id="subject" name="subject" placeholder="Worum geht's?" />

        <label for="message">Nachricht</label>
        <textarea id="message" name="message" rows="6" required placeholder="Schreibe deine Nachricht hier..."></textarea>

        <button type="submit" class="btn-send">Senden</button>
      </form>
    </main>

  </body>
  <footer class="site-footer">
    <div class="footer-container">
      <p>© 2026 Nic Heller — Alle Rechte vorbehalten.</p>
    </div>
  </footer>
</html>
